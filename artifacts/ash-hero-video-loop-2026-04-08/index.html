<!DOCTYPE html>

<head>

  <title>The Digital Forge (Video Loop) · 2026-04-08</title>
  <link id="site-style-link" rel="stylesheet" href="../../assets/css/site.css" />
  <style>
    body, html {
      margin: 0; padding: 0; width: 100%; height: 100%;
      background: #050607;
      overflow-x: hidden;
    }
    .video-hero-shell {
      position: relative;
      width: 100%;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .video-background {
      position: absolute;
      top: 50%;
      left: 50%;
      min-width: 100%;
      min-height: 100%;
      width: auto;
      height: auto;
      transform: translate(-50%, -50%);
      z-index: 0;
      opacity: 0.65;
      object-fit: cover;
    }
    .video-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(5,6,8,0.2) 0%, rgba(5,6,8,0.7) 100%),
                  radial-gradient(circle at 50% 50%, transparent 20%, rgba(0,0,0,0.6) 100%);
      z-index: 1;
      pointer-events: none;
    }
    .hero-content {
      position: relative;
      z-index: 2;
      text-align: center;
      color: rgba(248, 242, 234, 0.95);
      max-width: 800px;
      padding: 0 24px;
    }
    .hero-content h1 {
      font-size: clamp(3rem, 8vw, 5.5rem);
      line-height: 1;
      margin: 0 0 24px;
      letter-spacing: -0.04em;
      text-shadow: 0 10px 40px rgba(0,0,0,0.8);
    }
    .hero-content .sub {
      font-size: 1.25rem;
      line-height: 1.8;
      color: rgba(248, 242, 234, 0.8);
      max-width: 32rem;
      margin: 0 auto;
      text-shadow: 0 4px 20px rgba(0,0,0,0.6);
    }
    .topbar {
      position: absolute;
      top: 0; left: 0; right: 0;
      z-index: 10;
      padding: 18px 24px;
      display: flex;
      justify-content: space-between;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      background: rgba(0,0,0,0.3);
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    .topbar a {
      color: #fff;
      text-decoration: none;
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      opacity: 0.8;
      transition: opacity 0.2s;
    }
    .topbar a:hover { opacity: 1; }
  </style>
</head>

    <div class="hero-content">
